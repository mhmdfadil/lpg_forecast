<header class="topbar">
    <div style="display:flex; align-items:center; gap: var(--space-3);">
        <button class="hamburger-btn" data-sidebar-toggle aria-label="Buka menu">
            <i class="fa-solid fa-bars"></i>
        </button>
        <div class="topbar-title">
            <div class="breadcrumb">{{ breadcrumb_text|default('Admin') }}</div>
            <h1>{{ page_title|default('Dashboard') }}</h1>
        </div>
    </div>
    <div class="topbar-actions">
        <div class="nm-card-sm" style="display:flex; align-items:center; gap:10px; padding: 8px 14px;">
            <div class="brand-mark" style="width:34px; height:34px; border-radius: 10px;">
                <i class="fa-solid fa-user" style="font-size:13px;"></i>
            </div>
            <div style="line-height:1.2;">
                <div style="font-weight:700; font-size:13px;">{{ admin_name or 'Admin' }}</div>
                <div style="font-size:11px; color: var(--ink-500);">Administrator</div>
            </div>
        </div>
    </div>
</header>
